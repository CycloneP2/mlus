name: Compile MLBB Mod Dylib

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Create include directory and headers
        run: |
          mkdir -p include
          
          # Create substrate.h dummy for compilation
          cat > include/substrate.h << 'EOF'
          #ifndef SUBSTRATE_H
          #define SUBSTRATE_H
          #include <stdbool.h>
          #include <stddef.h>
          #ifdef __cplusplus
          extern "C" {
          #endif
          void MSHookFunction(void *symbol, void *replace, void **result);
          #ifdef __cplusplus
          }
          #endif
          #endif
          EOF

      - name: Find and compile source file
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # Cari file source
          if [ -f "tweak.mm" ]; then
            SOURCE="tweak.mm"
          elif [ -f "mod.mm" ]; then
            SOURCE="mod.mm"
          elif [ -f "mlbb_mod.mm" ]; then
            SOURCE="mlbb_mod.mm"
          elif [ -f "ph1pro.mm" ]; then
            SOURCE="ph1pro.mm"
          else
            echo "Error: No source file found! (tweak.mm, mod.mm, mlbb_mod.mm, ph1pro.mm)"
            exit 1
          fi
          
          echo "✅ Compiling: $SOURCE"
          
          # Compile ke dylib
          xcrun -sdk iphoneos clang++ \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -I./include \
            -fobjc-arc \
            -Wl,-undefined,dynamic_lookup \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            "$SOURCE" \
            -o mlbb_mod.dylib
          
          echo "✅ Compile success!"

      - name: Sign dylib with entitlements
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>platform-application</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
              <key>com.apple.security.cs.debugger-attach</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          ldid -Sentitlements.plist mlbb_mod.dylib
          echo "✅ Dylib signed!"

      - name: Verify dylib
        run: |
          echo ""
          echo "========== FILE INFO =========="
          file mlbb_mod.dylib
          echo ""
          echo "========== ARCHITECTURE =========="
          lipo -info mlbb_mod.dylib
          echo ""
          echo "========== LOAD COMMANDS =========="
          otool -L mlbb_mod.dylib | head -10
          echo ""
          echo "========== SIZE =========="
          ls -lh mlbb_mod.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlbb_mod_dylib
          path: mlbb_mod.dylib
